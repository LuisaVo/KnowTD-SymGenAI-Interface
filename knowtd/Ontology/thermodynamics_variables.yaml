    is_a: Variable
    mixins:
      - Difference
      - ChangeOfStateVariable
    annotations:
      schema:mathExpression: del_e_pot
      schema:Unit: J/kg
  PolytropicExponent:
    is_a: Variable
    mixins:
      - ChangeOfStateVariable
    annotations:
