  PressureRatio:
    is_a: Variable
    mixins:
      - Ratio
      - ChangeOfStateVariable
    annotations:
      schema:mathExpression: ratio_p
      schema:Unit: none
  VolumeRatio:
    is_a: Variable
    mixins:
      - Ratio
      - ChangeOfStateVariable
    annotations:
      schema:mathExpression: ratio_v
      schema:Unit: none
  
