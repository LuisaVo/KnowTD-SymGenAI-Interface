    annotations:
      schema:mathExpression: T_2 / T_1 = (p_2 / p_1) ** ((n_poly-1)/n_poly)
    slot_usage:
      as_text:
        ifabsent: string(T_{change_of_state#final_state} / T_{change_of_state#initial_state} = (p_{change_of_state#final_state} / p_{change_of_state#initial_state})**((n_poly_{change_of_state#transition}-1)/n_poly_{change_of_state#transition}))
  IdealGasPolytropicChangeOfStateEquationII:
    is_a: SystemInChangeOfStateEquation
