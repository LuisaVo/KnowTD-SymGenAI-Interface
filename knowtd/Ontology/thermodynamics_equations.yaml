    annotations:
      schema:mathExpression: p_2 - p_1 = 0
    slot_usage:
      as_text:
        ifabsent: string(p_{change_of_state#final_state} - p_{change_of_state#initial_state} = 0)
  IsobaricWorkOnInternalStateEquation:
    is_a: IsobaricEquation
    annotations:
      schema:mathExpression: W_i = -p_1 * del_V
    slot_usage:
      as_text:
        ifabsent: string(W_i_{change_of_state#transition} = - p_{change_of_state#initial_state} * del_V_{change_of_state#transition})
  IsobaricSpecificWorkOnInternalStateEquation:
    is_a: IsobaricEquation
    annotations:
      schema:mathExpression: w_i = -p_1 * del_v
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = - p_{change_of_state#initial_state} * del_v_{change_of_state#transition})
  IsobaricPolytropicExponentEquation:
    is_a: IsobaricEquation
    annotations:
      schema:mathExpression: n_poly = 0
    slot_usage:
