id: https://gitlab.rhrk.uni-kl.de/knowtd/knowtd/-/blob/main/Ontology/thermodynamics_equations.yaml
title: Thermodynamics Equations
name: thermo_equations
description: |-
  Ontology to describe classes relating to thermodynamics.
license: https://creativecommons.org/publicdomain/zero/1.0/
version: 2.0.0

prefixes:
  thmo_equations: https://gitlab.rhrk.uni-kl.de/knowtd/knowtd/-/blob/main/Ontology/thermodynamics_equations.yaml/

default_prefix: thmo_equations
default_range: string

imports:
  - thermodynamics_concepts
  - thermodynamics_rules

#==================================
# Classes                         #
#==================================
classes:
  Equation:
    is_a: Element
    abstract: true
    slots:
      - id
      - as_text
      - related_variables
  
  Inequality:
    is_a: Equation
    abstract: true

  SecondLawAdiabaticIrreversible:
    is_a: Inequality
    mixins: 
      - AdiabaticRule
      - IrreversibleRule
    slots:
      - change_of_state_id
    annotations:
      schema:mathExpression: s_2 - s_1 > 0
    slot_usage:
      as_text:
        ifabsent: string(s_{change_of_state#final_state} - s_{change_of_state#initial_state} > 0)  
  
  BaseEquation:
    is_a: Equation
    mixin: true
    abstract: true

  DefiningEquation:
    is_a: BaseEquation
    mixin: true
    abstract: true

  AdditionalEquation:
    is_a: Equation
  
  SystemEquation:
    is_a: Equation
    abstract: true
    # mixins: SystemRules
    slots:
      - system_id
  AmountOfSubstanceEquation:
    is_a: SystemEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: n = m/M
    slot_usage:
      as_text:
        ifabsent: string(m_{system} = M_{system#material}*n_{system})  

  MaterialEquation:
    is_a: Equation
    abstract: true
    slots:
      - material_id
  MolarHeatCapacityConstantPressureEquation:
    is_a: MaterialEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: c_pm = c_p * M
    slot_usage:
      as_text:
        ifabsent: string(c_pm_{material} = c_p_{material} * M_{material})
  MolarHeatCapacityConstantVolumeEquation:
    is_a: MaterialEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: c_vm = c_v * M
    slot_usage:
      as_text:
        ifabsent: string(c_vm_{material} = c_v_{material} * M_{material})
  KappaPolytropicExponentEquation:
    is_a: MaterialEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: kappa = c_p/c_v
    slot_usage:
      as_text:
        ifabsent: string(kappa_{material} = c_p_{material}/c_v_{material})

  IdealGasEquation:
    is_a: MaterialEquation
    abstract: true
    mixins:
      - IdealGasMaterialRule
  CaloricEquationOfStateIdealGas:
    is_a: IdealGasEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: R = c_p - c_v
    slot_usage:
      as_text:
        ifabsent: string(R_{material} = c_p_{material} - c_v_{material})
  SpecificGasConstantEquation:
    is_a: IdealGasEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: R = Rbar / M
    slot_usage:
      as_text:
        ifabsent: string(R_{material} = Rbar_{material} / M_{material})
    
  

  StateEquation:
    is_a: Equation
    abstract: true
    slots:
      - state_id
  EnthalpyEquation:
    is_a: StateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: H = U + p*V
    slot_usage:
      as_text:
        ifabsent: string(H_{state} = U_{state} + p_{state}*V_{state})
  SpecificEnthalpyEquation:
    is_a: StateEquation
    annotations:
      schema:mathExpression: h = u + p*v
    slot_usage:
      as_text:
        ifabsent: string(h_{state} = u_{state} + p_{state}*v_{state})
  ThermalDensityEquation:
    is_a: StateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: rho = 1/v
    slot_usage:
      as_text:
        ifabsent: string(rho_{state} = 1/v_{state})
 
  SystemInStateEquation:
    is_a: Equation
    abstract: true
    # mixins: SystemRules
    slots:
      - system_id
      - state_id
  SpecificStateVariableVEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: v = V/m
    slot_usage:
      as_text:
        ifabsent: string(v_{state} = V_{state}/m_{system})
  SpecificStateVariableUEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: u = U/m
    slot_usage:
      as_text:
        ifabsent: string(u_{state} = U_{state}/m_{system})
  SpecificStateVariableHEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: h = H/m
    slot_usage:
      as_text:
        ifabsent: string(h_{state} = H_{state}/m_{system})
  SpecificStateVariableSEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: s = S/m
    slot_usage:
      as_text:
        ifabsent: string(s_{state} = S_{state}/m_{system})
  MolarStateVariableSEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: sm = S/n
    slot_usage:
      as_text:
        ifabsent: string(sm_{state} = S_{state}/n_{system})
  SpecificKineticEnergyCenterMassEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: e_kin = E_kin/m
    slot_usage:
      as_text:
        ifabsent: string(e_kin_{state} = E_kin_{state}/m_{system})
  SpecificPotentialEnergyCenterMassEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: e_pot = E_pot/m
    slot_usage:
      as_text:
        ifabsent: string(e_pot_{state} = E_pot_{state}/m_{system})
  SpecificDensityEquation:
    is_a: SystemInStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: rho = m/V
    slot_usage:
      as_text:
        ifabsent: string(rho_{state} = m_{system}/V_{state})


  IdealGasSystemInStateEquation:
    is_a: SystemInStateEquation
    abstract: true
    mixins: 
      - IdealGasRule
  IdealGasLaw:
    is_a: IdealGasSystemInStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: p * V = m * R * T
    slot_usage:
      as_text:
        ifabsent: string(p_{state} * V_{state} = m_{system} * R_{system#material} * T_{state})
  SpecificIdealGasLaw:
    is_a: IdealGasSystemInStateEquation
    annotations:
      schema:mathExpression: p * v = R * T
    slot_usage:
      as_text:
        ifabsent: string(p_{state} * v_{state} = R_{system#material} * T_{state})
  IdealGasLawAmountOfSubstance:
    is_a: IdealGasSystemInStateEquation
    annotations:
      schema:mathExpression: p * V = n * Rbar * T
    slot_usage:
      as_text:
        ifabsent: string(p_{state} * V_{state} = n_{system} * Rbar_{system#material} * T_{state})
  SpecificVolumeDensityEquation:
    is_a: IdealGasSystemInStateEquation
    annotations:
      schema:mathExpression: h = u + R*T
    slot_usage:
      as_text:
        ifabsent: string(h_{state} = u_{state} + R_{system#material}*T_{state})

  PerfectGasSystemInStateEquation:
    is_a: SystemInStateEquation
    abstract: true
    mixins: 
      - PerfectGasRule
  InternalEnergyEquation:
    is_a: PerfectGasSystemInStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: u = c_v * (T - T0)
    slot_usage:
      as_text:
        ifabsent: string(u_{state} = c_v_{system#material} * (T_{state} - T0_{state}))


  ChangeOfStateEquation:
    is_a: Equation
    abstract: true
    slots:
      - change_of_state_id
  ChangeOfStateDifferenceEquation:
    is_a: ChangeOfStateEquation
    abstract: true
  DelTEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_T = T_2 - T_1
    slot_usage:
      as_text:
        ifabsent: string(del_T_{change_of_state#transition} = T_{change_of_state#final_state} - T_{change_of_state#initial_state})
  DelPEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_p = p_2 - p_1
    slot_usage:
      as_text:
        ifabsent: string(del_p_{change_of_state#transition} = p_{change_of_state#final_state} - p_{change_of_state#initial_state})
  DelVEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_V = V_2 - V_1
    slot_usage:
      as_text:
        ifabsent: string(del_V_{change_of_state#transition} = V_{change_of_state#final_state} - V_{change_of_state#initial_state})
  DelvEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_v = v_2 - v_1
    slot_usage:
      as_text:
        ifabsent: string(del_v_{change_of_state#transition} = v_{change_of_state#final_state} - v_{change_of_state#initial_state})
  DelUEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_U = U_2 - U_1
    slot_usage:
      as_text:
        ifabsent: string(del_U_{change_of_state#transition} = U_{change_of_state#final_state} - U_{change_of_state#initial_state})
  DeluEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_u = u_2 - u_1
    slot_usage:
      as_text:
        ifabsent: string(del_u_{change_of_state#transition} = u_{change_of_state#final_state} - u_{change_of_state#initial_state})
  DelHEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_H = H_2 - H_1
    slot_usage:
      as_text:
        ifabsent: string(del_H_{change_of_state#transition} = H_{change_of_state#final_state} - H_{change_of_state#initial_state})
  DelhEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_h = h_2 - h_1
    slot_usage:
      as_text:
        ifabsent: string(del_h_{change_of_state#transition} = h_{change_of_state#final_state} - h_{change_of_state#initial_state})
  DelSEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_S = S_2 - S_1
    slot_usage:
      as_text:
        ifabsent: string(del_S_{change_of_state#transition} = S_{change_of_state#final_state} - S_{change_of_state#initial_state})
  DelsEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_s = s_2 - s_1
    slot_usage:
      as_text:
        ifabsent: string(del_s_{change_of_state#transition} = s_{change_of_state#final_state} - s_{change_of_state#initial_state})
  DelsmEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_sm = sm_2 - sm_1
    slot_usage:
      as_text:
        ifabsent: string(del_sm_{change_of_state#transition} = sm_{change_of_state#final_state} - sm_{change_of_state#initial_state})
  DelCEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_c = c_2 - c_1
    slot_usage:
      as_text:
        ifabsent: string(del_c_{change_of_state#transition} = c_{change_of_state#final_state} - c_{change_of_state#initial_state})
  DelZEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_z = z_2 - z_1
    slot_usage:
      as_text:
        ifabsent: string(del_z_{change_of_state#transition} = z_{change_of_state#final_state} - z_{change_of_state#initial_state})
  DelEKinEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_E_kin = E_kin_2 - E_kin_1
    slot_usage:
      as_text:
        ifabsent: string(del_E_kin_{change_of_state#transition} = E_kin_{change_of_state#final_state} - E_kin_{change_of_state#initial_state})
  DelEPotEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_E_pot = E_pot_2 - E_pot_1
    slot_usage:
      as_text:
        ifabsent: string(del_E_pot_{change_of_state#transition} = E_pot_{change_of_state#final_state} - E_pot_{change_of_state#initial_state})
  DeleKinEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_e_kin = e_kin_2 - e_kin_1
    slot_usage:
      as_text:
        ifabsent: string(del_e_kin_{change_of_state#transition} = e_kin_{change_of_state#final_state} - e_kin_{change_of_state#initial_state})
  DelePotEquation:
    is_a: ChangeOfStateDifferenceEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: del_e_pot = e_pot_2 - e_pot_1
    slot_usage:
      as_text:
        ifabsent: string(del_e_pot_{change_of_state#transition} = e_pot_{change_of_state#final_state} - e_pot_{change_of_state#initial_state})
  PolytropicExponentEquation:
    is_a: ChangeOfStateEquation
    mixins: 
      - DefiningEquation
      - PolytropicRule
    annotations:
      schema:mathExpression: n_poly = ln(p_1/p_2)/ln(v_2/v_1)
    slot_usage:
      as_text:
        ifabsent: string(n_poly_{change_of_state#transition} = ln(p_{change_of_state#initial_state} / p_{change_of_state#final_state})/ln(v_{change_of_state#final_state} / v_{change_of_state#initial_state}))
  WorkOnInternalExternalStateEquation:
    is_a: ChangeOfStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: W = W_i + W_a
    slot_usage:
      as_text:
        ifabsent: string(W_{change_of_state#transition} = W_i_{change_of_state#transition} + W_a_{change_of_state#transition})
  SpecificWorkOnInternalExternalStateEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: w = w_i + w_a
    slot_usage:
      as_text:
        ifabsent: string(w_{change_of_state#transition} = w_i_{change_of_state#transition} + w_a_{change_of_state#transition})
  VolumeStirringElectricalWorkEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: W_i = W_vol + W_stir + W_electrical
    slot_usage:
      as_text:
        ifabsent: string(W_i_{change_of_state#transition} = W_vol_{change_of_state#transition} + W_stir_{change_of_state#transition} + W_electrical_{change_of_state#transition})
  FirstLaw:
    is_a: ChangeOfStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: Q + W = del_U + del_E_kin + del_E_pot
    slot_usage:
      as_text:
        ifabsent: string(Q_{change_of_state#transition} + W_{change_of_state#transition} = del_U_{change_of_state#transition} + del_E_kin_{change_of_state#transition} + del_E_pot_{change_of_state#transition})
  FirstLawSpecific:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: q + w = del_u + del_e_kin + del_e_pot
    slot_usage:
      as_text:
        ifabsent: string(q_{change_of_state#transition} + w_{change_of_state#transition} = del_u_{change_of_state#transition}+ del_e_kin_{change_of_state#transition} + del_e_pot_{change_of_state#transition})
  TechnicalWorkEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: w_t = w_i + w_a + p_2 * v_2 - p_1 * v_1
    slot_usage:
      as_text:
        ifabsent: string(w_t_{change_of_state#transition} = w_i_{change_of_state#transition} + w_a_{change_of_state#transition} + p_{change_of_state#final_state} * v_{change_of_state#final_state} - p_{change_of_state#initial_state} * v_{change_of_state#initial_state})
  WorkOnExternalStateEquation:
    is_a: ChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: W_a = del_E_kin + del_E_pot
    slot_usage:
      as_text:
        ifabsent: string(W_a_{change_of_state#transition} = del_E_kin_{change_of_state#transition} + del_E_pot_{change_of_state#transition})
  RatioVolumeEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: ratio_v = v_2 / v_1
    slot_usage:
      as_text:
        ifabsent: string(ratio_v_{change_of_state#transition} = v_{change_of_state#final_state} / v_{change_of_state#initial_state})
  RatioTemperatureEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: ratio_T = T_2 / T_1
    slot_usage:
      as_text:
        ifabsent: string(ratio_T_{change_of_state#transition} = T_{change_of_state#final_state} / T_{change_of_state#initial_state})
  RatioPressureEquation:
    is_a: ChangeOfStateEquation
    annotations:
      schema:mathExpression: ratio_p = p_2 / p_1
    slot_usage:
      as_text:
        ifabsent: string(ratio_p_{change_of_state#transition} = p_{change_of_state#final_state} / p_{change_of_state#initial_state})

  SystemInChangeOfStateEquation:
    is_a: Equation
    abstract: true
    # mixins: SystemRules
    slots:
      - system_id
      - change_of_state_id
  SpecificHeatTransferEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: q = Q/m
    slot_usage:
      as_text:
        ifabsent: string(q_{change_of_state#transition} = Q_{change_of_state#transition}/m_{system})
  SpecificWorkTransferEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w = W/m
    slot_usage:
      as_text:
        ifabsent: string(w_{change_of_state#transition} = W_{change_of_state#transition}/m_{system})
  SpecificWorkOnInternalStateEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w_i = W_i / m
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = W_i_{change_of_state#transition} / m_{system})
  SpecificWorkOnExternalStateEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w_a = W_a / m
    slot_usage:
      as_text:
        ifabsent: string(w_a_{change_of_state#transition} = W_a_{change_of_state#transition} / m_{system})
  SpecificVolumeChangeWorkEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w_vol = W_vol / m
    slot_usage:
      as_text:
        ifabsent: string(w_vol_{change_of_state#transition} = W_vol_{change_of_state#transition} / m_{system})
  SpecificStirringWorkEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w_stir = W_stir / m
    slot_usage:
      as_text:
        ifabsent: string(w_stir_{change_of_state#transition} = W_stir_{change_of_state#transition} / m_{system})
  SpecificElectricalWorkEquation:
    is_a: SystemInChangeOfStateEquation
    mixins: 
      - DefiningEquation
    annotations:
      schema:mathExpression: w_electrical = W_electrical / m
    slot_usage:
      as_text:
        ifabsent: string(w_electrical_{change_of_state#transition} = W_electrical_{change_of_state#transition} / m_{system})
  PerfectGasChangeOfStateEquation:
    is_a: SystemInChangeOfStateEquation
    abstract: true
    mixins:
      - PerfectGasRule
  DelHPerfectGasEquation:
    is_a: PerfectGasChangeOfStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: del_h = c_p * del_T
    slot_usage:
      as_text:
        ifabsent: string(del_h_{change_of_state#transition} = c_p_{system#material} * del_T_{change_of_state#transition})
  DelUPerfectGasEquation:
    is_a: PerfectGasChangeOfStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: del_u = c_v * del_T
    slot_usage:
      as_text:
        ifabsent: string(del_u_{change_of_state#transition} = c_v_{system#material} * del_T_{change_of_state#transition})
  DelSPerfectGasVolumeEquation:
    is_a: PerfectGasChangeOfStateEquation
    annotations:
      schema:mathExpression: del_s = c_v * ln(T_2/T_1) + R*ln(v_2/v_1)
    slot_usage:
      as_text:
        ifabsent: string(del_s_{change_of_state#transition} = c_v_{system#material} * ln(T_{change_of_state#final_state} / T_{change_of_state#initial_state}) + R_{system#material} * ln(v_{change_of_state#final_state} / v_{change_of_state#initial_state}))
  DelSPerfectGasVolumeEquationII:
    is_a: PerfectGasChangeOfStateEquation
    annotations:
      schema:mathExpression: del_sm = c_vm * ln(T_2/T_1) + Rbar*ln(v_2/v_1)
    slot_usage:
      as_text:
        ifabsent: string(del_sm_{change_of_state#transition} = c_vm_{system#material} * ln(T_{change_of_state#final_state} / T_{change_of_state#initial_state}) + Rbar_{system#material} * ln(v_{change_of_state#final_state} / v_{change_of_state#initial_state}))


  IsochoricEquation:
    is_a: ChangeOfStateEquation
    abstract: true
    mixins:
      - IsochoricRule
  IsochoricVolumeEquation:
    is_a: IsochoricEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: V_2 - V_1 = 0
    slot_usage:
      as_text:
        ifabsent: string(V_{change_of_state#final_state} - V_{change_of_state#initial_state} = 0)
  IsochoricSpecificVolumeEquation:
    is_a: IsochoricEquation
    annotations:
      schema:mathExpression: v_2 - v_1 = 0
    slot_usage:
      as_text:
        ifabsent: string(v_{change_of_state#final_state} - v_{change_of_state#initial_state} = 0)
  IsochoricSpecificWorkOnInternalStateEquation:
    is_a: IsochoricEquation
    annotations:
      schema:mathExpression: w_i = 0
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = 0)
  IsochoricWorkOnInternalStateEquation:
    is_a: IsochoricEquation
    annotations:
      schema:mathExpression: W_i = 0
    slot_usage:
      as_text:
        ifabsent: string(W_i_{change_of_state#transition} = 0)
