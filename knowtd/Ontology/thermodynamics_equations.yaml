      - IsochoricRule
  IsochoricIdealGasPressureTemperatureRatio:
    is_a: IsochoricIdealGasEquation
    annotations:
      schema:mathExpression: ratio_T = ratio_p
    slot_usage:
      as_text:
        ifabsent: string(ratio_T_{change_of_state#transition} = ratio_p_{change_of_state#transition})

  IsothermalChangeOfStateEquation:
    is_a: ChangeOfStateEquation
    abstract: true
    mixins:
      - IsothermalRule
  IsothermalProperties:
    is_a: IsothermalChangeOfStateEquation
    mixins: 
      - BaseEquation
    annotations:
      schema:mathExpression: T_2 - T_1 = 0
    slot_usage:
      as_text:
        ifabsent: string(T_{change_of_state#final_state} - T_{change_of_state#initial_state} = 0)
  IsothermalWorkOnInternalStateEquation:
    is_a: IsothermalChangeOfStateEquation
    annotations:
      schema:mathExpression: w_i = del_u - T_1 * del_s
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = del_u_{change_of_state#transition} - T_{change_of_state#initial_state} * del_s_{change_of_state#transition})

  IsothermalIdealGasEquation:
    is_a: SystemInChangeOfStateEquation
    abstract: true
    mixins:
      - IdealGasRule
      - IsothermalRule
  IsothermalIdealGasPressureVolumeRatio:
    is_a: IsothermalIdealGasEquation
    annotations:
      schema:mathExpression: v_2 / v_1 = p_1 / p_2
    slot_usage:
      as_text:
        ifabsent: string(v_{change_of_state#final_state} / v_{change_of_state#initial_state} = p_{change_of_state#initial_state} / p_{change_of_state#final_state})
  IsothermalIdealGasWorkEquation:
    is_a: IsothermalIdealGasEquation
    annotations:
      schema:mathExpression: W_i = p_1 * V_1 * ln(p_2/p_1)
    slot_usage:
      as_text:
        ifabsent: string(W_i_{change_of_state#transition} = p_{change_of_state#initial_state} * V_{change_of_state#initial_state} * ln(p_{change_of_state#final_state}/p_{change_of_state#initial_state}))
  IsothermalIdealGasWorkEquationII:
    is_a: IsothermalIdealGasEquation
    annotations:
      schema:mathExpression: w_i = R * T_1 * ln(p_2/p_1)
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = R_{system#material} * T_{change_of_state#initial_state} * ln(p_{change_of_state#final_state}/p_{change_of_state#initial_state}))
  IsothermalIdealGasPolytropicExponentEquation:
    is_a: IsothermalIdealGasEquation
    annotations:
      schema:mathExpression: n_poly = 1
    slot_usage:
      as_text:
        ifabsent: string(n_poly_{change_of_state#transition} = 1)

  IsothermalPerfectGasEquation:
    is_a: SystemInChangeOfStateEquation
    abstract: true
    mixins:
      - PerfectGasRule
      - IsothermalRule
  IsothermalPerfectGasEntropyEquation:
    is_a: IsothermalPerfectGasEquation
    annotations:
      schema:mathExpression: del_s = R * ln(v_2/v_1)
    slot_usage:
      as_text:
        ifabsent: string(del_s_{change_of_state#transition} = R_{system#material} * ln(v_{change_of_state#final_state} / v_{change_of_state#initial_state}))
  IsothermalPerfectGasWorkOnInternalStateEquation:
    is_a: IsothermalPerfectGasEquation
    annotations:
      schema:mathExpression: w_i = -T_1 * del_s
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = - T_{change_of_state#initial_state} * del_s_{change_of_state#transition})

  IsobaricEquation:
    is_a: ChangeOfStateEquation
    abstract: true
    mixins:
      - IsobaricRule
  IsobaricProperties:
    is_a: IsobaricEquation
    mixins: 
