    slot_usage:
      as_text:
        ifabsent: string(del_sm_{change_of_state#transition} = 0)

  IsentropicPerfectGasEquation:
    is_a: SystemInChangeOfStateEquation
    abstract: true
    mixins:
      - PerfectGasRule
      - IsentropicRule
  IsentropicPerfectGasPolytropicExponentEquation:
    is_a: IsentropicPerfectGasEquation
    annotations:
      schema:mathExpression: kappa = n_poly
    slot_usage:
      as_text:
        ifabsent: string(kappa_{system#material} = n_poly_{change_of_state#transition})
  IsentropicPerfectGasTechnicalWorkEquation:
    is_a: IsentropicPerfectGasEquation
    annotations:
      schema:mathExpression: w_t = kappa * w_i
    slot_usage:
      as_text:
        ifabsent: string(w_t_{change_of_state} = kappa_{system#material} * w_i_{change_of_state#transition})
  IsentropicPerfectGasWorkEquation:
    is_a: IsentropicPerfectGasEquation
    annotations:
      schema:mathExpression: w_i = (R * T_1 / (kappa-1)) * ((p_2/p_1)** ((kappa-1)/kappa) -1))
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = (R_{system#material} * T_{change_of_state#initial_state} / (kappa_{system#material} -1)) * ((p_{change_of_state#final_state} / p_{change_of_state#initial_state})**((kappa_{system#material} - 1)/ kappa_{system#material}) - 1))
  IsentropicPerfectGasTemperatureEquation:
    is_a: IsentropicPerfectGasEquation
    annotations:
      schema:mathExpression: T_1 / T_2 = (p_1/p_2) ** ((kappa - 1)/kappa)
    slot_usage:
      as_text:
        ifabsent: string(T_{change_of_state#initial_state} / T_{change_of_state#final_state} = (p_{change_of_state#initial_state}/p_{change_of_state#final_state})**((kappa_{system#material} -1)/kappa_{system#material}) )
    
  PolytropicEquation:
    is_a: SystemInChangeOfStateEquation
    abstract: true
    mixins:
      - PolytropicRule
  PolytropicWorkEquation:
    is_a: PolytropicEquation
    annotations:
      schema:mathExpression: w_i = p_1 * v_1 / (n_poly-1) * ((v_1 / v_2) ** (n_poly-1) - 1)
    slot_usage:
      as_text:
        ifabsent: string(w_i_{change_of_state#transition} = (p_{change_of_state#initial_state} * v_{change_of_state#initial_state} / (n_poly_{change_of_state#transition} - 1)) * ((v_{change_of_state#initial_state} / v_{change_of_state#final_state})**(n_poly_{change_of_state#transition} -1) -1))

