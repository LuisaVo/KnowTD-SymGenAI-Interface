# **Question:**  A cylinder contains m = 1 kg of an ideal gas. The initial volume, pressure and temperature are V_1 = 0.8 m^3, p_1 = 1 bar, and T_1 = 298 K. After an adiabatic reversible compression, the final pressure and temperature are p_2 = 2.9 bar, and T_2 = 333 K. Calculate the molar mass of the gas, and its molar heat capacity at constant volume c_v.
problem_class: SingleStep
system:
