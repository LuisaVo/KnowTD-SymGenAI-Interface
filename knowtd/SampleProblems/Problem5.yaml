# **Question:**  A gas in a cylinder is expanded, whereby the specific volume increases from v_1 = 0.8 m^3/kg to v_2 = 1.5 m^3/kg. The cylinder is heated in such a way that the pressure p = 1 bar remains constant during the entire process. Calculate the work and the heat per kilogram of gas.

# The gas is ideal, with R = 297 J/(kg K) and c_v = 1040 J/(kg K).
problem_class: SingleStep
system:
  id: I
  material: Gas
  related_changes_and_states: 
    - A
pureMaterial:
  id: Gas
  R:
    value: 297
  c_v:
    value: 1040
  equation_of_state:
    id: eos_gas
    model: perfect gas
states:
  - id: 1
    p:
      value: 100000
    v:
      value: 0.8
  - id: 2
    v:
      value: 1.5
change_of_state:
  id: A
  initial_state: 1
  final_state: 2
  transition:
    id: 12
    is_isobaric: true
required_variables:
  - q_12
  - w_12