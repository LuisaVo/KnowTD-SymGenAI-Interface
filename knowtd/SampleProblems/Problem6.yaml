# **Question:**  A gas in rigid tank with the volume V = 0.05 m^3 is stirred. The initial temperature and pressure are T_1 = 315 K, p_1 = 1 bar. The stirrer supplies a work of 0.5 kJ. The tank is cooled, as there is a threshold for the final temperature. Calculate the heat that is removed if the final temperature is T_2 = 320 K. 

# The gas is ideal, with R = 287 J/(kg K) and c_v = 1010 J/(kg K).
problem_class: SingleStep
system:
  id: I
  material: Gas
  related_changes_and_states: 
    - A
pureMaterial:
  id: Gas
  R:
    value: 287
  c_v:
    value: 1010
  equation_of_state:
    id: eos_gas
    model: perfect gas
states:
  - id: 1
    V:
      value: 0.05
    T:
      value: 315
    p:
      value: 100000
  - id: 2
    T:
      value: 320
change_of_state:
  id: A
  initial_state: 1
  final_state: 2
  transition:
    id: 12
    W:
      value: 500
    # is_isochoric: true
required_variables:
  - Q_12