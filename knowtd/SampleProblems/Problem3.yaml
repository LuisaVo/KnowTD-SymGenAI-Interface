# **Question:**  A gas in a cooled cylinder undergoes an isothermal compression at T = 298 K. The initial and final pressure are p_1 = 1 bar, p_2 = 1.6 bar. Calculate the heat that has to be removed per kilogram of gas.

# The gas is ideal, with R = 518 J/(kg K).
