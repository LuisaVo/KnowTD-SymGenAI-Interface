# Heat is isothermally transferred to $V_1 = 1 L$ of gas during the first step (State 1 $\rightarrow$ State 2). Then follows an adiabatic and reversible expansion of the gas up to $V_2 = 10 L$, reducing the temperature to $T_3 = 301 K$ (State 2 $\rightarrow$ State 3). Heat then isothermally dissipates from the system, the volume decreases down to $V_4 = 6.5 L$ (State 3 $\rightarrow$ State 4). Finally, the gas undergoes an  diabatic and reversible compression, increasing the temperature back to $T_1$ (State 4 $\rightarrow$ State 1). 
# - Calculate the temperature $T_1$
# - Calculate the supplied heat $q_12$ per kilogram of gas.
# - Calculate the removed heat $q_34$ per kilogram of gas.
# - We consider $m = 30.0 g$ of gas. Calculate for each state the corresponding pressure.
# Assumptions:
# - Changes in kinetic and potential energy are negligible
# - The gas stays a perfect gas during the cycle
# - The changes of state occur through equilibria
# Substance data:
# - $c_v = 1009 \frac{J}{kg K}$
# - $M = 30 \frac{g}{mol}$

problem_class: CyclicProcess
system:
  id: I
  material: Gas
  related_changes_and_states: 
    - A
    - B
    - C
    - D
  m:
    value: 0.03
pureMaterial:
  id: Gas
  M:
    value: 0.03
  c_v:
    value: 1009
  equation_of_state:
    id: eos_gas
    model: perfect gas
states:
  - id: 1
    V:
      value: 0.001
  - id: 2
    V:
      value: 0.01
  - id: 3
    T:
      value: 301
  - id: 4
    V:
      value: 0.005
change_of_states:
  - id: A
    initial_state: 1
    final_state: 2
    transition:
      id: 12
      is_isothermal: true
  - id: B
    initial_state: 2
    final_state: 3
    transition:
      id: 23
      adiabatic: true
      reversible: true
      is_isentropic: true
  - id: C
    initial_state: 3
    final_state: 4
    transition:
      id: 34
      adiabatic: true
      reversible: true
      is_isentropic: true
  - id: D
    initial_state: 4
    final_state: 1
    transition:
      id: 41
      reversible: true
required_variables:
  - T_1
  - q_12
  - q_34