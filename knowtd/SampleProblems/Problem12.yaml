# **Question:**  A gas in a cylinder expands adiabatically. The initial pressure and specific volume are p_1 = 1.9 bar and v_1 = 0.9 m^3/kg, the final pressure and specific volume are p_2 = 1 bar and v_2 = 1.5 m^3/kg. Calculate the work per kilogram of gas and the change of the specific entropy.

# The gas is ideal with c_v = 1040 J/(kg K) and has a molar mass of 28 g/mol.  
